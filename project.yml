name: jirafs
options:
  bundleIdPrefix: com.zumix
  deploymentTarget:
    macOS: "15.4"
  developmentLanguage: en
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top
  xcodeVersion: "16.1"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MACOSX_DEPLOYMENT_TARGET: "15.4"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "KPZ4FUM7GD"
    CODE_SIGN_STYLE: Automatic
    ENABLE_HARDENED_RUNTIME: YES

packages:
  SwiftMarkdown:
    url: https://github.com/apple/swift-markdown
    from: 0.4.0

targets:
  JiraAPI:
    type: framework
    platform: macOS
    sources:
      - path: JiraAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs.JiraAPI
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES

  JiraFSCore:
    type: framework
    platform: macOS
    sources:
      - path: JiraFSCore
    dependencies:
      - target: JiraAPI
      - package: SwiftMarkdown
        product: Markdown
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs.JiraFSCore
        DEFINES_MODULE: YES
        DYLIB_INSTALL_NAME_BASE: "@rpath"
        SKIP_INSTALL: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        GENERATE_INFOPLIST_FILE: YES

  jirafs-extension:
    type: extensionkit-extension
    platform: macOS
    sources:
      - path: jirafs-extension
    dependencies:
      - target: JiraAPI
        embed: true
      - target: JiraFSCore
        embed: true
    info:
      path: jirafs-extension/Info.plist
      properties:
        CFBundleDisplayName: jirafs
        CFBundleName: $(PRODUCT_NAME)
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.fskit.fsmodule
          FSActivateOptionSyntax:
            shortOptions: "o:"
          FSCheckOptionSyntax:
            shortOptions: "nqy"
          FSFormatOptionSyntax:
            shortOptions: "v"
          FSMediaTypes: {}
          FSPersonalities:
            jirafsPersonality:
              FSName: jirafs
              FSfileObjectsAreCaseSensitive: false
          FSSupportedSchemes:
            - jira
          FSShortName: jirafs
          FSSupportsBlockResources: false
          FSSupportsGenericURLResources: true
          FSSupportsPathURLs: false
          FSSupportsServerURLs: true
          FSSupportsURLMounting: true
    entitlements:
      path: jirafs-extension/jirafs-extension.entitlements
      properties:
        com.apple.developer.fskit.fsmodule: true
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.zumix.jirafs.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs.fskit
        EXTENSIONKIT_EXTENSION: YES
        SWIFT_OBJC_BRIDGING_HEADER: jirafs-extension/jirafs-extension-Bridging-Header.h
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"

  jirafs:
    type: application
    platform: macOS
    sources:
      - path: jirafs
    dependencies:
      - target: JiraAPI
        embed: true
      - target: JiraFSCore
        embed: true
      - target: jirafs-extension
        embed: true
    info:
      path: jirafs/Info.plist
      properties:
        CFBundleDisplayName: jirafs
        CFBundleName: $(PRODUCT_NAME)
        LSMinimumSystemVersion: $(MACOSX_DEPLOYMENT_TARGET)
        NSHumanReadableCopyright: "Copyright © 2026"
        NSPrincipalClass: NSApplication
        CFBundleURLTypes:
          - CFBundleURLName: JIRA File System
            CFBundleURLSchemes:
              - jira
    entitlements:
      path: jirafs/jirafs.entitlements
      properties:
        com.apple.security.network.client: true
        keychain-access-groups:
          - $(AppIdentifierPrefix)com.zumix.jirafs.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ALLOW_ENTITLEMENTS_MODIFICATION: YES

  JiraAPITests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JiraAPITests
    dependencies:
      - target: JiraAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs.JiraAPITests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

  JiraFSCoreTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests/JiraFSCoreTests
    dependencies:
      - target: JiraFSCore
      - target: JiraAPI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zumix.jirafs.JiraFSCoreTests
        GENERATE_INFOPLIST_FILE: YES
        MACOSX_DEPLOYMENT_TARGET: "14.0"

schemes:
  jirafs:
    build:
      targets:
        jirafs: all
        jirafs-extension: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - JiraAPITests
        - JiraFSCoreTests
    archive:
      config: Release
