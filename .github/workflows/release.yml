name: release
on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      publish:
        default: false
        type: boolean
    secrets:
      MACOS_CERTIFICATE:
        required: true
      MACOS_CERTIFICATE_PWD:
        required: true
      APPLE_ID:
        required: true
      APPLE_APP_SPECIFIC_PASSWORD:
        required: true
      TEAM_ID:
        required: true
      BUILD_PROVISION_PROFILE_APP_BASE64:
        required: true
      BUILD_PROVISION_PROFILE_EXT_BASE64:
        required: true
      BUILD_PROVISION_PROFILE_CONF_EXT_BASE64:
        required: true
      MY_ACTIONS_APP_CLIENT_ID:
        required: true
      MY_ACTIONS_APP_PRIVATE_KEY:
        required: true

permissions: {}

jobs:
  release:
    runs-on: macos-15
    environment: prod
    outputs:
      sha256: ${{ steps.sha256.outputs.sha256 }}
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      TAG: ${{ inputs.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Install Provisioning Profiles
        env:
          BUILD_PROVISION_PROFILE_APP_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_APP_BASE64 }}
          BUILD_PROVISION_PROFILE_EXT_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_EXT_BASE64 }}
          BUILD_PROVISION_PROFILE_CONF_EXT_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_CONF_EXT_BASE64 }}
        run: |
          APP_PP_PATH=$RUNNER_TEMP/jirafs.provisionprofile
          EXT_PP_PATH=$RUNNER_TEMP/jirafs-extension.provisionprofile
          CONF_EXT_PP_PATH=$RUNNER_TEMP/confluencefs-extension.provisionprofile
          echo -n "$BUILD_PROVISION_PROFILE_APP_BASE64" | base64 --decode -o $APP_PP_PATH
          echo -n "$BUILD_PROVISION_PROFILE_EXT_BASE64" | base64 --decode -o $EXT_PP_PATH
          echo -n "$BUILD_PROVISION_PROFILE_CONF_EXT_BASE64" | base64 --decode -o $CONF_EXT_PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $APP_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          cp $EXT_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/
          cp $CONF_EXT_PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and Archive
        run: |
          xcodebuild -project jirafs.xcodeproj -scheme jirafs -configuration Release -archivePath build/jirafs.xcarchive archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=KPZ4FUM7GD \
            PROVISIONING_PROFILE_SPECIFIER_CONFLUENCEFS_EXT="confluencefs Extension Developer ID"

      - name: Prepare Export Options
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          sed "s/TEAM_ID_PLACEHOLDER/$TEAM_ID/g" exportOptions.plist > exportOptions_modified.plist

      - name: Export Archive
        run: |
          xcodebuild -exportArchive -archivePath build/jirafs.xcarchive -exportPath build/jirafs \
            -exportOptionsPlist exportOptions_modified.plist

      - name: Notarize App
        timeout-minutes: 90
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          ditto -c -k --keepParent build/jirafs/jirafs.app build/jirafs/jirafs.zip
          NOTARIZE_OUTPUT=$(xcrun notarytool submit build/jirafs/jirafs.zip \
            --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$TEAM_ID" \
            --wait --timeout 1h --output-format json)
          echo "$NOTARIZE_OUTPUT"
          STATUS=$(echo "$NOTARIZE_OUTPUT" | jq -r '.status')
          SUBMISSION_ID=$(echo "$NOTARIZE_OUTPUT" | jq -r '.id')
          if [ "$STATUS" != "Accepted" ]; then
            echo "Notarization failed: $STATUS"
            xcrun notarytool log "$SUBMISSION_ID" \
              --apple-id "$APPLE_ID" --password "$APPLE_APP_SPECIFIC_PASSWORD" --team-id "$TEAM_ID"
            exit 1
          fi

      - name: Staple Notarization
        run: |
          xcrun stapler staple build/jirafs/jirafs.app

      - name: Create DMG
        run: |
          create-dmg --volname "jirafs" --volicon "jirafs/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "jirafs.app" 200 190 --hide-extension "jirafs.app" --app-drop-link 600 185 "jirafs-$TAG.dmg" "build/jirafs/"

      - name: Compute SHA256
        id: sha256
        run: echo "sha256=$(shasum -a 256 "jirafs-$TAG.dmg" | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        run: |
          RELEASE_NOTES="Release notes for $TAG"
          ASSET="jirafs-$TAG.dmg"

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "$ASSET" --clobber
            gh release edit "$TAG" --draft=false
          else
            gh release create "$TAG" --title "Release $TAG" --notes "$RELEASE_NOTES" "$ASSET"
          fi

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    environment: prod
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.ref || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2
        with:
          repository: srz-zumix/homebrew-tap
          persist-credentials: false

      - uses: actions/checkout@v6.0.2
        with:
          persist-credentials: false
          path: jirafs
          ref: ${{ env.TAG }}

      - name: Update Homebrew Tap
        if: github.event_name == 'push' || inputs.publish
        env:
          SHA256: ${{ needs.release.outputs.sha256 }}
        run: |
          VERSION="${TAG#v}"

          mkdir -p Casks
          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SHA256}}/$SHA256/g" \
            ./jirafs/.github/homebrew/jirafs.rb.tmpl > Casks/jirafs.rb

      - name: Check for diff
        id: check-diff
        if: github.event_name == 'push' || inputs.publish
        run: |
          git add Casks/jirafs.rb
          if git diff --exit-code --cached -- Casks/jirafs.rb; then
            echo "diff=0" >> "${GITHUB_OUTPUT}"
          else
            echo "diff=1" >> "${GITHUB_OUTPUT}"
          fi
          git reset

      - uses: actions/create-github-app-token@v3
        id: app-token
        if: steps.check-diff.outputs.diff == '1'
        with:
          client-id: ${{ secrets.MY_ACTIONS_APP_CLIENT_ID }}
          private-key: ${{ secrets.MY_ACTIONS_APP_PRIVATE_KEY }}
          owner: srz-zumix
          repositories: homebrew-tap
          permission-contents: write

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        if: steps.check-diff.outputs.diff == '1'
        with:
          commit_message: "Update jirafs Homebrew Tap for $TAG"
          github_token: ${{ steps.app-token.outputs.token }}
          repository: srz-zumix/homebrew-tap
          files: |
            Casks/jirafs.rb
