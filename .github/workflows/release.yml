name: release
on:
  push:
    tags:
      - "v*"
  workflow_call:
    inputs:
      ref:
        required: true
        type: string
      publish:
        default: false
        type: boolean

permissions: {}

jobs:
  release:
    runs-on: macos-15
    permissions:
      contents: write
      id-token: write
      attestations: write
    env:
      GH_TOKEN: ${{ github.token }}
      DEVELOPER_DIR: /Applications/Xcode_16.4.app/Contents/Developer
      TAG: ${{ inputs.ref || github.ref_name }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Import Code-Signing Certificates
        uses: Apple-Actions/import-codesign-certs@5142e029c445c10ffc7149d172e540235a065466 # v7.0.0
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build and Archive
        run: |
          xcodebuild -project jirafs.xcodeproj -scheme jirafs -configuration Release -archivePath build/jirafs.xcarchive archive

      - name: Prepare Export Options
        env:
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          sed "s/TEAM_ID_PLACEHOLDER/$TEAM_ID/g" exportOptions.plist > exportOptions_modified.plist

      - name: Export Archive
        run: |
          xcodebuild -exportArchive -archivePath build/jirafs.xcarchive -exportPath build/jirafs -exportOptionsPlist exportOptions_modified.plist

      - name: Notarize App
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          TEAM_ID: ${{ secrets.TEAM_ID }}
        run: |
          xcrun notarytool submit build/jirafs/jirafs.app --apple-id $APPLE_ID --password $APPLE_APP_SPECIFIC_PASSWORD --team-id $TEAM_ID --wait

      - name: Staple Notarization
        run: |
          xcrun stapler staple build/jirafs/jirafs.app

      - name: Create DMG
        run: |
          create-dmg --volname "jirafs" --volicon "jirafs/Assets.xcassets/AppIcon.appiconset/icon_512x512@2x.png" --window-pos 200 120 --window-size 800 400 --icon-size 100 --icon "jirafs.app" 200 190 --hide-extension "jirafs.app" --app-drop-link 600 185 "jirafs-$TAG.dmg" "build/jirafs/"

      - name: Create GitHub Release
        run: |
          gh release create "$TAG" --title "Release $TAG" --notes "Release notes for $TAG" jirafs-$TAG.dmg

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.ref || github.ref_name }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          repository: srz-zumix/homebrew-tap
          persist-credentials: false

      - name: Download DMG from GitHub Release
        run: |
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern "jirafs-$TAG.dmg"

      - name: Update Homebrew Tap
        if: github.event_name == 'push' || inputs.publish
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          SHA256=$(shasum -a 256 "jirafs-$TAG.dmg" | awk '{print $1}')

          mkdir -p Casks
          sed -e "s/{{VERSION}}/$VERSION/g" -e "s/{{SHA256}}/$SHA256/g" \
            .github/homebrew/jirafs.rb.tmpl > Casks/jirafs.rb

      - name: Check for diff
        id: check-diff
        if: github.event_name == 'push' || inputs.publish
        run: |
          if git diff --quiet -- Casks/jirafs.rb; then
            echo "diff=0" >> "$GITHUB_OUTPUT"
          else
            echo "diff=1" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/create-github-app-token@v3
        id: app-token
        if: steps.check-diff.outputs.diff == '1'
        with:
          client-id: ${{ secrets.MY_ACTIONS_APP_CLIENT_ID }}
          private-key: ${{ secrets.MY_ACTIONS_APP_PRIVATE_KEY }}
          permission-contents: write

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        if: steps.check-diff.outputs.diff == '1'
        with:
          commit_message: "Update jirafs Homebrew Tap for $TAG"
          github_token: ${{ steps.app-token.outputs.token }}
          files: |
            Casks/jirafs.rb
