name: Release drafter
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions: {}

jobs:
  draft_release:
    runs-on: ubuntu-latest
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
      # for release workflow
      id-token: write
      attestations: write
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@c2e2804cc59f45f57076a99af580d0fedb697927 # v7.3.0
        id: release-drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update version files and create PR
        env:
          TAG: ${{ steps.release-drafter.outputs.tag_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${TAG#v}"
          BRANCH="release/$TAG"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git fetch origin "$BRANCH" 2>/dev/null && git checkout "$BRANCH" || git checkout -b "$BRANCH"

          echo "$VERSION" > VERSION
          for p in jirafs/Info.plist jirafs-extension/Info.plist; do
            sed -i "/<key>CFBundleShortVersionString<\/key>/{n; s|<string>.*</string>|<string>$VERSION</string>|}" "$p"
          done

          git add VERSION jirafs/Info.plist jirafs-extension/Info.plist
          if git diff --staged --quiet; then
            echo "No changes"
            exit 0
          fi
          git commit -m "Bump version to $TAG"
          git push origin "$BRANCH" --force

          if ! gh pr list --head "$BRANCH" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "Release $TAG" \
              --body "Bump version to $TAG" \
              --base main \
              --head "$BRANCH"
          fi

  publish_release:
    needs: draft_release
    uses: ./.github/workflows/release.yml
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      publish: true
      ref: ${{ needs.draft_release.outputs.tag_name }}
    secrets: inherit
