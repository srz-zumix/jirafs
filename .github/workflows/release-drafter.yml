name: Release drafter
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

jobs:
  draft_release:
    runs-on: ubuntu-latest
    permissions:
      # write permission is required to create a github release
      contents: write
      # write permission is required for autolabeler
      # otherwise, read permission is required at least
      pull-requests: write
    outputs:
      tag_name: ${{ steps.release-drafter.outputs.tag_name }}
    steps:
      - uses: release-drafter/release-drafter@693d20e7c1ce1a81d3a41962f85914253b518449 # v7.3.1
        id: release-drafter
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bump_version_pr:
    needs: draft_release
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    env:
      TAG: ${{ needs.draft_release.outputs.tag_name }}
      BRANCH: "bump/${{ needs.draft_release.outputs.tag_name }}"
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Update version files
        id: update-version
        run: |
          VERSION="${TAG#v}"

          sed -i "s/MARKETING_VERSION: \".*\"/MARKETING_VERSION: \"${VERSION}\"/" project.yml

          if git diff --quiet; then
            echo "No changes"
            echo "diff=0" >> "${GITHUB_OUTPUT}"
          else
            echo "diff=1" >> "${GITHUB_OUTPUT}"
          fi

      - name: Commit changes
        uses: suzuki-shunsuke/commit-action@06e3b49d4706498d325d29bd85adc82ecf2f5d8f # v1.0.0
        if: steps.update-version.outputs.diff == '1'
        with:
          commit_message: "Bump version to ${{ needs.draft_release.outputs.tag_name }}"
          branch: ${{ env.BRANCH }}
          force_push: true
          files: |
            project.yml

      - name: Create pull request
        if: steps.update-version.outputs.diff == '1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ! gh pr list --head "${BRANCH}" --state open --json number --jq '.[0].number' | grep -q .; then
            gh pr create \
              --title "Release ${TAG}" \
              --body "Bump version to ${TAG}" \
              --base main \
              --head "${BRANCH}"
          fi

  publish_release:
    needs: draft_release
    uses: ./.github/workflows/release.yml
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      id-token: write
      attestations: write
    with:
      publish: true
      ref: ${{ needs.draft_release.outputs.tag_name }}
    secrets: inherit
